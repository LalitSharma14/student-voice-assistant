<?xml version="1.0" encoding="utf-8"?>
<!DOCTYPE svg PUBLIC "-//W3C//DTD SVG 1.1//EN" "http://www.w3.org/Graphics/SVG/1.1/DTD/svg11.dtd">
<svg version="1.1" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" width="100%" height="100%" viewBox="-22 -22 44 44">
 <title>Amazing cube net</title>
 <desc>A net of a cube by plasticinsect, redrawn by CMG Lee based on http://puzzling.stackexchange.com/questions/84967 . In the SVG file, hover over it to reveal colour-code the cube's faces</desc>
 <style type="text/css">
#main       { fill-opacity:0; }
#main:hover { fill-opacity:1; }
 </style>
 <circle cx="0" cy="0" r="99999" fill="#ffffff"/>

 <g id="main" transform="rotate(45)">
  <path d="M 30, 0 l -9, 9 v -6 h -6 v  6 h -12 v -6 h  6 v  12 h -6 v  6 h  6
           l -9, 9 l -9,-9 h  6 v -6 h -6 v -12 h  6 v  6 h -12 v -6 h -6 v  6
           l -9,-9 l  9,-9 v  6 h  6 v -6 h  12 v  6 h -6 v -12 h  6 v -6 h -6
           l  9,-9 l  9, 9 h -6 v  6 h  6 v  12 h -6 v -6 h  12 v  6 h  6 v -6 z"
        fill="#999999" fill-opacity="1" fill-rule="evenodd"/>
  <g fill="#00cc00">
   <path id="side" d="M 9,-3 l -3,6 h  3 v 6 h 6 v   -6 h 6 v 6 l 4, -4 z
                      M 9,12 v    3 h -6 v 6 h 6 l -4,4 l -8,-4 l 6,-12"/>
   <use xlink:href="#side" transform="rotate( 90)" fill="#ff0000"/>
   <use xlink:href="#side" transform="rotate(180)" fill="#0066ff"/>
   <use xlink:href="#side" transform="rotate(270)" fill="#ffcc00"/>
  </g>
  <g fill="#cc00ff">
   <path id="bottom" d="M 30,0 l -5,5 l -4,-2 l 4,-8 z"/>
   <use xlink:href="#bottom" transform="rotate( 90)"/>
   <use xlink:href="#bottom" transform="rotate(180)"/>
   <use xlink:href="#bottom" transform="rotate(270)"/>
  </g>
  <path d="M 6,  3 h -3 v  6 h  6 v  3 l -12,-6 v -3 h -6 v  6 h -3
           l 6,-12 h  3 v -6 h -6 v -3 l  12, 6 v  3 h  6 v -6 h  3 z" fill="#666666"/>
 </g>
</svg>
