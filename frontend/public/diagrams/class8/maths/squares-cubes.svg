<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420">
  <rect width="760" height="420" fill="#fbfdff"/>
  <text x="380" y="45" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#164b80">Squares and Cubes</text>
  <g transform="translate(120 95)">
    <text x="105" y="0" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#164b80">Square Number</text>
    <g fill="#dbeafe" stroke="#2f5f98" stroke-width="3">
      <rect x="15" y="35" width="60" height="60"/><rect x="75" y="35" width="60" height="60"/><rect x="135" y="35" width="60" height="60"/>
      <rect x="15" y="95" width="60" height="60"/><rect x="75" y="95" width="60" height="60"/><rect x="135" y="95" width="60" height="60"/>
      <rect x="15" y="155" width="60" height="60"/><rect x="75" y="155" width="60" height="60"/><rect x="135" y="155" width="60" height="60"/>
    </g>
    <text x="105" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#101828">3 x 3 = 9</text>
  </g>
  <g transform="translate(460 105)">
    <text x="95" y="-10" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#164b80">Cube Number</text>
    <polygon points="40,80 110,40 180,80 110,120" fill="#ffd6a5" stroke="#b36b00" stroke-width="3"/>
    <polygon points="40,80 110,120 110,210 40,170" fill="#ffb703" stroke="#b36b00" stroke-width="3"/>
    <polygon points="110,120 180,80 180,170 110,210" fill="#fb8500" stroke="#b36b00" stroke-width="3"/>
    <text x="110" y="255" text-anchor="middle" font-family="Arial, sans-serif" font-size="22" fill="#101828">3 x 3 x 3 = 27</text>
  </g>
  <text x="380" y="385" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" fill="#475467">Square means rows and columns. Cube means length, breadth, and height.</text>
</svg>
