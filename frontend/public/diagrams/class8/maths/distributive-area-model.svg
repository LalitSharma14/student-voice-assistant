<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 420">
  <rect width="760" height="420" fill="#fbfdff"/>
  <text x="380" y="48" text-anchor="middle" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#164b80">Distributive Property</text>
  <g transform="translate(120 110)" font-family="Arial, sans-serif">
    <rect x="0" y="40" width="310" height="150" fill="#dbeafe" stroke="#2f5f98" stroke-width="4"/>
    <rect x="310" y="40" width="190" height="150" fill="#dcfce7" stroke="#16845b" stroke-width="4"/>
    <line x1="310" y1="40" x2="310" y2="190" stroke="#101828" stroke-width="4"/>
    <text x="250" y="28" text-anchor="middle" font-size="22" font-weight="700" fill="#101828">b + c</text>
    <text x="-35" y="125" text-anchor="middle" font-size="22" font-weight="700" fill="#101828">a</text>
    <text x="155" y="125" text-anchor="middle" font-size="28" font-weight="700" fill="#164b80">a x b</text>
    <text x="405" y="125" text-anchor="middle" font-size="28" font-weight="700" fill="#16845b">a x c</text>
  </g>
  <text x="380" y="360" text-anchor="middle" font-family="Arial, sans-serif" font-size="24" font-weight="700" fill="#164b80">a(b + c) = ab + ac</text>
</svg>
